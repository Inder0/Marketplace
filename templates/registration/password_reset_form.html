{% extends 'base.html' %}

{% block title %}Reset Password{% endblock %}

{% block content %}

<div class="max-w-md mx-auto">

    <div class="bg-gradient-to-r from-blue-900 to-blue-950 rounded-2xl p-6 text-white shadow-lg mb-6">
        <h1 class="text-xl font-semibold">Reset Password</h1>
        <p class="text-sm text-indigo-100">Enter your email to receive reset link</p>
    </div>

    <div class="card">

        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <div>
                <label class="block text-sm text-gray-200 mb-2">Email:</label>
                {{ form.email }}
            </div>

            {% for error,text in form.errors.items %}
                <p class="text-red-500 text-sm">{{ text }}</p>
            {% endfor %}

            <button class="w-full bg-blue-900 text-white py-2 rounded-lg hover:bg-blue-900">
                Send Reset Link
            </button>
        </form>

    </div>

</div>

{% endblock %}
