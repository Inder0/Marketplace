{% if onboarding %}
    <form method="POST" enctype="multipart/form-data">
{% else %}
    <form
        method="POST"
        hx-post="{% url 'profile-edit' %}"
        hx-target="#edit-profile-container"
        hx-swap="innerHTML"
        enctype="multipart/form-data">
{% endif %}

    {% csrf_token %}
    <div class="space-y-4">
        <div class="grid grid-cols-[120px_1fr] items-center gap-4">
                {% for field in form %}
                    {{ field.label }}
                    {{ field }}
                {% endfor %}
    <div class="col-span-2 justify-center">
    <button type="submit" class=" button mt-4">Save Changes</button>
    </div>
</div>
</form>
