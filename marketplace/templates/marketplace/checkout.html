{% extends "base.html" %}
{% block content %}
    <h1>Checkout</h1>
    <p>Product: {{ product.name }}</p>
    <p>Price: ₹{{ product.price }}</p>
    <div class="card mt-4">
        <form method="post" id="checkout-form">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-4">
                    {{ field.label_tag }}<br>
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-red-500 text-sm mt-1">{{ field.errors }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="button">Pay Now</button>
        </form>
{% endblock %}
