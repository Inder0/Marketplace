{% extends 'base.html' %}
{% block content %}
    <div class=" product-container flex md:flex-row flex-col items-center  md:gap-x-8 gap-y-4">
    {% for product in products %}
        <div class="card md:w-64 w-72 h-auto">
            <div class="flex">
                <img class=" mr-3 mb-3 rounded-xl" src="{{product.file_url}}">
            </div>
            <div>{{product.name}}</div>
            <div class="text-gray-300">{{product.description}}</div>
            <div class="flex mt-1.5 text-green-400">Rs. {{product.price}}
                <a class="button !font-normal text-center !p-2 !text-xs !ml-auto" href="{% url 'product-detail' product.id %}">View Details</a>
            </div>
        </div>

    {% endfor %}
    </div>
{% endblock %}
